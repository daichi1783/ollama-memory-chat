<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OllamaMemoryChat</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>🧠 OllamaMemoryChat</h1>
      <div class="version">v0.1.0-beta</div>
    </div>
    <nav class="sidebar-nav">
      <button id="new-chat-btn" onclick="createNewSession()">✏️ 新しいチャット</button>
      <div id="session-list" class="session-list"></div>
      <a href="/settings" class="nav-item settings-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        設定・コマンド管理
      </a>
    </nav>
    <div class="status-indicator">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText" class="status-text">確認中...</span>
    </div>
  </aside>

  <!-- メインエリア -->
  <main class="main">
    <!-- モデルミスマッチアラートバナー -->
    <div id="modelMismatchAlert" class="model-mismatch-alert" style="display:none;">
      <div class="alert-inner">
        <span class="alert-icon">⚠️</span>
        <div class="alert-text">
          <strong>設定されたモデルがインストールされていません</strong>
          <span id="alertModelName"></span>
          <div class="alert-progress" id="alertProgress"></div>
          <div class="alert-progress-bar-wrap" id="alertProgressBarWrap">
            <div class="alert-progress-bar" id="alertProgressBar"></div>
          </div>
        </div>
        <div class="alert-actions">
          <button class="alert-install-btn" id="alertInstallBtn" onclick="installConfiguredModel()">今すぐインストール</button>
          <button class="alert-close-btn" onclick="hideModelMismatchAlert()" title="閉じる">×</button>
        </div>
      </div>
    </div>

    <!-- チャットメッセージ -->
    <div id="chatMessages" class="chat-container"></div>

    <!-- 入力エリア -->
    <div class="input-area">
      <div class="input-wrapper">
        <!-- コマンドサジェスト -->
        <div id="commandSuggest" class="command-suggest"></div>

        <div class="input-box">
          <textarea
            id="messageInput"
            placeholder="メッセージを入力...（/でコマンド、Cmd+Enterで送信）"
            rows="1"
          ></textarea>
          <button id="sendBtn" class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">
          Cmd+Enterで送信 · Enterで改行 · /でコマンド補完
        </div>
      </div>
    </div>
  </main>

  <!-- トースト通知 -->
  <div id="toast" class="toast"></div>

  <script>
    // 起動時チェック: Ollamaセットアップ完了済みか確認
    (async function checkSetup() {
      try {
        const r = await fetch('http://127.0.0.1:8765/api/setup/status');
        const status = await r.json();
        if (!status.setup_complete) {
          // セットアップが完了していない → セットアップ画面へ
          window.location.href = '/setup';
        }
      } catch (e) {
        // APIに繋がらない場合は通常通り表示（起動直後など）
      }
    })();
  </script>

  <script src="/assets/app.js"></script>
</body>
</html>
